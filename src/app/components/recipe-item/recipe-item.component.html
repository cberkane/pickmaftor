<div *ngIf="recipe" class="card">
    <header>
        <h2>{{ recipe.name }}</h2>
        <icon [icon]="recipe.icon"></icon>
    </header>
    <hr>
    <ng-container *ngFor="let ingredient of recipe.ingredients; let i = index;">
        <p> {{i + 1}}. {{ ingredient.designation | titlecase }}</p>
    </ng-container>
</div>

<div *ngIf="!recipe" class="empty">
    <h2>What are we eating today ?</h2>
    <img src="/assets/icons/burger.svg" alt="Empty placeholder">
</div>
